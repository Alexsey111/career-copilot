services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: career-copilot-api
    env_file:
      - ../../.env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-career_user}:${POSTGRES_PASSWORD:-career_pass}@postgres:5432/${POSTGRES_DB:-career_copilot}
      SYNC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-career_user}:${POSTGRES_PASSWORD:-career_pass}@postgres:5432/${POSTGRES_DB:-career_copilot}
      MINIO_SECURE: "false"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    container_name: career-copilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-career_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-career_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-career_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: career-copilot-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"

  minio:
    image: minio/minio:latest
    container_name: career-copilot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
